[workspace]
resolver = "3"
members = ["crates/loractl-core", "crates/loractl-cli"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["Lauri Gates"]
repository = "https://github.com/laurigates/loractl"
rust-version = "1.85"

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
