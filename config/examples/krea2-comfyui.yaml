# A real Krea 2 LoRA run pointing at a ComfyUI install's SCATTERED files —
# no restructuring into an HF snapshot dir, no duplicate files, no symlinks.
#
# ComfyUI keeps each component in its own tree under models/; the four
# model.*_path overrides point straight at those files. `base` is only the
# root that RELATIVE overrides join onto (and the fallback location for any
# component you DON'T override) — set it to your ComfyUI models/ dir.
#
# Absolute override paths are used verbatim; relative ones join onto `base`.

task: flow-matching

model:
  base: /home/you/ComfyUI/models    # your ComfyUI models/ root
  variant: krea2                    # architecture; the denoiser below is a Krea-2 scaled-fp8 repack
  denoiser:     diffusion_models/krea2/krea2_raw_fp8_scaled.safetensors
  text_encoder: text_encoders/qwen/qwen3vl_4b_fp8_scaled.safetensors
  vae:          vae/qwen/qwen_image_vae.safetensors
  # tokenizer: omitted — ComfyUI ships no tokenizer.json, so loractl fetches
  #            the model-invariant Qwen3-VL tokenizer once (SHA-256 pinned,
  #            cached under HF_HOME) automatically. Set this only to use a
  #            tokenizer.json you already have:
  # tokenizer:  /path/to/qwen3vl/tokenizer.json

dataset:
  path: /path/to/dataset            # images + same-named .txt captions
  resolution: 512                   # multiple of 16
  batch_size: 1

lora:
  rank: 16
  alpha: 16.0
  # Target choice is a SCOPE/QUALITY decision, not a memory lever (ADR-0005
  # Addendum 2: retention is topology-driven — one adapter anywhere tracks
  # the whole downstream trunk). Alternatives:
  #   - pattern: 'blocks\.'               # every trunk projection
  #   - pattern: 'attn\.(wq|wv)$'         # minimal q/v-only set
  targets:
    - pattern: 'blocks\.\d+\.attn\.'    # attention projections only

optim:
  lr: 1.0e-4

steps: 500
seed: 42

output:
  dir: output/krea2-lora
  name: krea2-lora

# The numerically-clean GPU route on a 24 GB NVIDIA card: cuda f32 + int4
# frozen-base quantization (int4 reclaims to ~10.1 GB resident; int8's
# ~17.1 GB step OOMed) + block-level gradient checkpointing (#134):
# `grad_checkpointing: true` stores only block inputs and replays block
# interiors in backward, collapsing the monolithic step's measured
# 67.9 GiB of pinned demand (ADR-0005 Addendum 2) to ~1 residual-stream
# tensor per block plus one transient block graph. Requires
# `lora.dropout: 0` (a replay would redraw masks). Verify fit with
# `just step-probe` — the gate is a zero-panic run, not a survived OOM
# storm.
compute:
  backend: cuda
  precision: f32
  quant: int4
  grad_checkpointing: true

flow:
  shift_mode: resolution            # ai-toolkit Krea 2 parity (#84): per-batch
                                    # shift exp(μ), μ linear 0.5@256 → 1.15@6400
                                    # image tokens
